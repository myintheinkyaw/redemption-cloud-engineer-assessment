apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: redemption-app
  namespace: redemption
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: rollout
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    app.kubernetes.io/version: "1.0.0"
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: redemption
      app.kubernetes.io/component: app
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause:
          duration: 60s
      - setWeight: 50
      - pause:
          duration: 120s
      - setWeight: 100
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 10
  minReadySeconds: 30
  progressDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redemption
        app.kubernetes.io/component: app
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: redemption-platform
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: redemption-app
        image: redemption-platform:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        - name: APP_PORT
          value: "8080"
        envFrom:
        - configMapRef:
            name: redemption-config
        - secretRef:
            name: redemption-secrets
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: config-volume
          mountPath: /etc/config
          readOnly: true
        - name: logs-volume
          mountPath: /var/log/redemption
      volumes:
      - name: tmp-volume
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
      - name: config-volume
        configMap:
          name: redemption-config
      - name: logs-volume
        emptyDir:
          sizeLimit: 1Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - redemption
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                  - app
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                - t3.medium
                - t3.large
                - t3.xlarge
