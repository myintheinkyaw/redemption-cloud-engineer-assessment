apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: redemption-ingress
  namespace: redemption
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: ingress
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    app.kubernetes.io/version: "1.0.0"
    environment: production
    annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/load-balancer-attributes: "idle_timeout.timeout_seconds=60,routing.http.drop_invalid_header_fields.enabled=true"
    alb.ingress.kubernetes.io/tags: "Environment=production,Project=redemption-platform,ManagedBy=terraform"

spec:
  ingressClassName: alb
  rules:
    - host: redemption.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redemption-service
                port:
                  number: 80