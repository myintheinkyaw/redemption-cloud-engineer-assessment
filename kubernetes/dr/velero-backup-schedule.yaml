apiVersion: velero.io/v1
kind: Schedule

metadata:
  name: redemption-backup-schedule
  namespace: velero
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: disaster-recovery
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    environment: production

spec:
  schedule: "0 */6 * * *"
  template:
    includedNamespaces:
      - redemption
    storageLocation: default
    snapshotVolumes: true
    ttl: 720h0m0s
    includeClusterResources: true