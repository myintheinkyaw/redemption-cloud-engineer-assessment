apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-agent-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    environment: production
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-agent
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    app.kubernetes.io/version: "2.54.1"
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redemption
      app.kubernetes.io/component: observability
      app.kubernetes.io/part-of: redemption-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redemption
        app.kubernetes.io/component: observability
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: redemption-platform
        app.kubernetes.io/version: "2.54.1"
        environment: production
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.54.1
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        ports:
        - name: http
          containerPort: 9090
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: prometheus-agent-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-agent
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    environment: production
spec:
  selector:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: redemption-platform
  ports:
  - name: http
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP