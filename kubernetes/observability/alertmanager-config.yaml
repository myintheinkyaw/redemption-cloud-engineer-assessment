apiVersion: v1
kind: ConfigMap

metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    environment: production

data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by:
        - alertname
        - namespace
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: default

      - name: webhook
        webhook_configs:
          - url: http://alert-receiver.monitoring.svc.cluster.local/alerts