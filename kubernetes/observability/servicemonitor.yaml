apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redemption-servicemonitor
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    environment: production
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redemption
      app.kubernetes.io/component: app
  namespaceSelector:
    matchNames:
    - redemption
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s