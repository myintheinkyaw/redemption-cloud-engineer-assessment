apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: redemption-app-scaledobject
  namespace: redemption
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
    app.kubernetes.io/version: "1.0.0"
    environment: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redemption-app
  pollingInterval: 30  # Check metrics every 30 seconds
  cooldownPeriod: 300  # Wait 5 minutes before scaling down after last trigger
  minReplicaCount: 3   # Minimum number of replicas (matches deployment)
  maxReplicaCount: 20  # Maximum number of replicas (allows for 6.6x scaling)
  advanced:
    restoreToOriginalReplicaCount: true  # Scale back to min replicas when no triggers active
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
          - type: Percent
            value: 50
            periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 4
            periodSeconds: 15
  triggers:
  # CPU-based scaling: Scale when average CPU utilization exceeds 70%
  - type: cpu
    metadata:
      type: Utilization
      value: "70"
  
  # Memory-based scaling: Scale when average memory utilization exceeds 80%
  - type: memory
    metadata:
      type: Utilization
      value: "80"