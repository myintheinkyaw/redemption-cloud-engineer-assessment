apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: redemption-nodepool
  labels:
    environment: production
    workload: redemption
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: redemption-platform
spec:
  template:
    spec:
      requirements:
      - key: "karpenter.sh/capacity-type"
        operator: In
        values:
        - spot
        - on-demand
      - key: "node.kubernetes.io/instance-type"
        operator: In
        values:
        - t3.medium
        - t3.large
        - t3.xlarge
        - t3a.medium
        - t3a.large
        - t3a.xlarge
        - m6i.medium
        - m6i.large
        - m6i.xlarge
      - key: "kubernetes.io/arch"
        operator: In
        values: ["amd64"]
      - key: "kubernetes.io/os"
        operator: In
        values: ["linux"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: redemption
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
  limits:
    cpu: "400"
    memory: "800Gi"